<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, initial-scale=1" />
  <title>solvida-label-berry-focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
  :root {
    --bg: #f6f3ee;
    --ink: #15171b;
    --soft-ink: #404552;
    --accent: #d89f3a;
    --border: rgba(21,23,27,0.14);
    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-5: 48px;
    --space-6: 64px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
  }

  h1, h2, h3 {
    font-family: "Cormorant Garamond", "Times New Roman", Georgia, serif;
    margin: 0;
    letter-spacing: -0.02em;
    line-height: 1.06;
    font-weight: 400;
  }

  p { margin: 0; }

  .grain {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(255,255,255,0.55), transparent 42%),
      radial-gradient(circle at 84% 12%, rgba(255,255,255,0.25), transparent 32%),
      radial-gradient(circle at 50% 80%, rgba(0,0,0,0.03), transparent 55%);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(2px);
  }

  .chip {
    display: inline-flex;
    align-items: center;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }


    .label {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #f4edf1 0%, #f4edf1 62%, #665266 62%, #665266 100%);
      overflow: hidden;
    }

    .label-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 84px 86px 72px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: var(--space-4);
    }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
    }

    .wordmark {
      font-size: 30px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(21,23,27,0.84);
      font-family: "Inter", "Source Sans 3", sans-serif;
      font-weight: 500;
    }

    .hero {
      display: grid;
      align-content: center;
      gap: 20px;
      width: min(840px, 100%);
    }

    .flavor {
      font-size: clamp(104px, 12.5vw, 156px);
      line-height: 0.95;
      color: #111319;
    }

    .subtitle {
      font-size: 34px;
      line-height: 1.2;
      color: rgba(17,19,25,0.72);
      max-width: 730px;
      font-weight: 300;
    }

    .footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .ingredients {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 700px;
    }

    .ingredients .chip {
      color: rgba(246,243,238,0.9);
      border-color: rgba(246,243,238,0.24);
      background: rgba(9,11,14,0.16);
      backdrop-filter: blur(3px);
    }

    .claim {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(246,243,238,0.88);
      background: linear-gradient(180deg, color-mix(in oklab, #b26db6 85%, white 15%) 0%, #b26db6 100%);
      padding: 13px 18px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.1);
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .arc {
      position: absolute;
      width: 72%;
      aspect-ratio: 1/1;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      right: -16%;
      top: -24%;
      z-index: 1;
    }

    .arc-2 {
      position: absolute;
      width: 66%;
      aspect-ratio: 1/1;
      border: 1px solid rgba(255,255,255,0.26);
      border-radius: 50%;
      right: -9%;
      top: -16%;
      z-index: 1;
    }
  </style>
</head>
<body>

  <main class="label">
    <div class="grain"></div>
    <div class="arc"></div>
    <div class="arc-2"></div>
    <section class="label-inner">
      <div class="row-top">
        <p class="wordmark">SOL VIDA</p>
        <span class="badge">Hydration + Glow</span>
      </div>
      <div class="hero">
        <h1 class="flavor">Berry\nFocus</h1>
        <p class="subtitle">Balanced hydration support with a bright berry profile.</p>
      </div>
      <div class="footer">
        <div class="ingredients"><span class="chip">Blueberry</span><span class="chip">Ginseng</span><span class="chip">Sea Salt</span></div>
        <span class="claim">Low Sugar • 2g</span>
      </div>
    </section>
  </main>
</body>
</html>
