name: Production Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: projects/products/endless-molt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/products/endless-molt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production monitor
        env:
          MONITOR_BASE_URL: https://www.endlessmolt.xyz
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          MONITOR_GITHUB_REPO: ${{ github.repository }}
          MONITOR_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run monitor:prod
